# =============================================================================
# Kubernetes Service for hs-cs411-capstone2
# =============================================================================
# NodePort 30444 -> containerPort 4444. NodePort chosen because the lab cluster
# may not have a LoadBalancer controller, and NodePort works on every cluster
# (bare-metal, kind, k3s, EKS without LB, etc.).
#
# Reach the app with:
#   curl http://<any-node-ip>:30444/
# or from inside the cluster:
#   curl http://hs-cs411-capstone2.default.svc.cluster.local:4444/
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hs-cs411-capstone2
  labels:
    app: hs-cs411-capstone2
spec:
  type: NodePort
  selector:
    app: hs-cs411-capstone2
  ports:
    - name: http
      protocol: TCP
      port: 4444          # Service port (in-cluster)
      targetPort: 4444    # containerPort on the pod
      nodePort: 30444     # External port on every node
